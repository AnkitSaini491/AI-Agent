
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | AI Agent Studio</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.dashboard{
padding:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:15px;
text-align:center;
transition:.3s;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

.card:hover{
transform:translateY(-10px);
}

.card h2{
font-size:40px;
margin-bottom:10px;
}

.profile{
background:#111827;
padding:25px;
border-radius:15px;
margin-top:40px;
}

.progress{
height:12px;
background:#334155;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.progress div{
height:100%;
width:75%;
background:#3b82f6;
}

</style>

</head>

<body>

<nav>

<div class="logo">🤖 AI Agent Studio</div>

<ul>

<li><a href="/">Home</a></li>
<li><a href="/chat">Chat</a></li>
<li><a href="/about">About</a></li>
<li><a href="/contact">Contact</a></li>

</ul>

</nav>

<div class="dashboard">

<h1>📊 AI Dashboard</h1>

<div class="cards">

<div class="card">
<h2>150+</h2>
<p>Total Chats</p>
</div>

<div class="card">
<h2>35</h2>
<p>AI Projects</p>
</div>

<div class="card">
<h2>98%</h2>
<p>Accuracy</p>
</div>

<div class="card">
<h2>24/7</h2>
<p>AI Online</p>
</div>

</div>

<div class="profile">

<h2>👤 User Profile</h2>

<p><b>Name:</b> ANKIT SAINI</p>

<p><b>Role:</b> Developer</p>

<p><b>Plan:</b> Premium</p>

<h3>AI Usage</h3>

<div class="progress">
<div></div>
</div>

</div>

</div>

</body>
</html>
