
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | AI Agent Studio</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.contact{
max-width:900px;
margin:50px auto;
padding:20px;
}

.contact-box{
background:#1e293b;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

.contact-box h1{
text-align:center;
margin-bottom:30px;
}

input,textarea{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
background:#334155;
color:white;
}

textarea{
height:150px;
resize:none;
}

button{
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

.info{
margin-top:40px;
text-align:center;
}

.info p{
margin:8px 0;
}

.success{
display:none;
background:#16a34a;
padding:15px;
border-radius:10px;
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<nav>

<div class="logo">🤖 AI Agent Studio</div>

<ul>

<li><a href="/">Home</a></li>
<li><a href="/chat">Chat</a></li>
<li><a href="/dashboard">Dashboard</a></li>
<li><a href="/about">About</a></li>

</ul>

</nav>

<div class="contact">

<div class="contact-box">

<h1>📞 Contact Us</h1>

<form onsubmit="sendMessage(event)">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea placeholder="Write your message..." required></textarea>

<button type="submit">
Send Message
</button>

</form>

<div class="success" id="success">
✅ Your message has been sent successfully!
</div>

<div class="info">

<h2>Developer</h2>

<p>👨‍💻 ANKIT SAINI</p>

<p>📧 as3126061@gmail.com</p>

<p>🌐 AI Agent Studio</p>

</div>

</div>

</div>

<script>

function sendMessage(e){

e.preventDefault();

document.getElementById("success").style.display="block";

}

</script>

</body>
</html>
