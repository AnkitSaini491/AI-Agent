<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Clone</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="chat-container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            🤖 Gemini AI

        </div>

        <button id="newChat">

            <i class="fa-solid fa-plus"></i>

            New Chat

        </button>

        <div class="history">

            <h3>Recent Chats</h3>

            <ul id="historyList"></ul>

        </div>

    </aside>

    <!-- Main Chat -->

    <main class="main-chat">

        <header class="topbar">

            <h2>Gemini AI Assistant</h2>

            <button id="themeBtn">

                🌙

            </button>

        </header>

        <section id="messages" class="messages">

            <div class="bot-message">

                👋 Hello! I'm Gemini AI.

                Ask me anything.

            </div>

        </section>

        <div id="typing" class="typing">

            Gemini is thinking...

        </div>

        <div class="input-box">

            <input
                type="text"
                id="userInput"
                placeholder="Message Gemini...">

            <button id="sendBtn">

                <i class="fa-solid fa-paper-plane"></i>

            </button>

        </div>

    </main>

</div>
        <script>

        const input = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");
        const messages = document.getElementById("messages");
        const typing = document.getElementById("typing");
        const historyList = document.getElementById("historyList");

        typing.style.display = "none";

        function addMessage(text, type){

            const div = document.createElement("div");

            div.className = type + "-message";

            div.innerHTML = text.replace(/\n/g,"<br>");

            messages.appendChild(div);

            messages.scrollTop = messages.scrollHeight;

        }

        function addHistory(text){

            const li = document.createElement("li");

            li.textContent = text.substring(0,35);

            historyList.prepend(li);

        }

        async function sendMessage(){

            const message = input.value.trim();

            if(message==="") return;

            addMessage(message,"user");

            addHistory(message);

            input.value="";

            typing.style.display="block";

            try{

                const response = await fetch("/ask",{

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({
                        message:message
                    })

                });

                const data = await response.json();

                typing.style.display="none";

                addMessage("🤖 "+data.reply,"bot");

            }

            catch(error){

                typing.style.display="none";

                addMessage("❌ Error connecting to Gemini AI.","bot");

            }

        }

        sendBtn.onclick = sendMessage;

        input.addEventListener("keypress",function(e){

            if(e.key==="Enter"){

                sendMessage();

            }

        });

        </script>
        <script>

// =========================
// Theme Toggle
// =========================

const themeBtn = document.getElementById("themeBtn");

let darkMode = true;

themeBtn.onclick = () => {

    if(darkMode){

        document.body.classList.add("light-mode");

        themeBtn.innerHTML = "☀️";

    }else{

        document.body.classList.remove("light-mode");

        themeBtn.innerHTML = "🌙";

    }

    darkMode = !darkMode;

};

// =========================
// New Chat
// =========================

document.getElementById("newChat").onclick = () => {

    messages.innerHTML = `

    <div class="bot-message">

    👋 Hello! I'm Gemini AI.<br><br>

    How can I help you today?

    </div>

    `;

    historyList.innerHTML = "";

};

// =========================
// Copy AI Message
// Double Click
// =========================

messages.addEventListener("dblclick",(e)=>{

    if(e.target.classList.contains("bot-message")){

        navigator.clipboard.writeText(e.target.innerText);

        alert("✅ Copied");

    }

});

// =========================
// Voice Input
// =========================

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SpeechRecognition){

    const recognition = new SpeechRecognition();

    recognition.lang = "en-US";

    const mic = document.createElement("button");

    mic.innerHTML = "🎤";

    mic.id = "micBtn";

    document.querySelector(".input-box").appendChild(mic);

    mic.onclick = ()=>{

        recognition.start();

    };

    recognition.onresult = (event)=>{

        input.value = event.results[0][0].transcript;

        sendMessage();

    };

}

// Auto Focus

window.onload = ()=>{

    input.focus();

};

</script>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
