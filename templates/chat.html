<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Clone</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="chat-container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            🤖 Gemini AI

        </div>

        <button id="newChat">

            <i class="fa-solid fa-plus"></i>

            New Chat

        </button>

        <div class="history">

            <h3>Recent Chats</h3>

            <ul id="historyList"></ul>

        </div>

    </aside>

    <!-- Main Chat -->

    <main class="main-chat">

        <header class="topbar">

            <h2>Gemini AI Assistant</h2>

            <button id="themeBtn">

                🌙

            </button>

        </header>

        <section id="messages" class="messages">

            <div class="bot-message">

                👋 Hello! I'm Gemini AI.

                Ask me anything.

            </div>

        </section>

        <div id="typing" class="typing">

            Gemini is thinking...

        </div>

        <div class="input-box">

            <input
                type="text"
                id="userInput"
                placeholder="Message Gemini...">

            <button id="sendBtn">

                <i class="fa-solid fa-paper-plane"></i>

            </button>

        </div>

    </main>

</div>
