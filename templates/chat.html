<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Studio</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:260px;
background:#111827;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:25px;
color:#38bdf8;
}

.new-chat{
background:#2563eb;
padding:12px;
border-radius:10px;
text-align:center;
cursor:pointer;
margin-bottom:20px;
transition:.3s;
}

.new-chat:hover{
background:#1d4ed8;
}

.history{
flex:1;
overflow-y:auto;
}

.history-item{
padding:10px;
margin-bottom:10px;
background:#1e293b;
border-radius:8px;
cursor:pointer;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:18px;
background:#111827;
font-size:22px;
text-align:center;
font-weight:bold;
}

.chat-box{
flex:1;
padding:25px;
overflow-y:auto;
}

.message{
max-width:75%;
padding:15px;
border-radius:12px;
margin-bottom:18px;
line-height:1.5;
word-wrap:break-word;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#334155;
margin-right:auto;
}

.input-area{
display:flex;
padding:20px;
background:#111827;
gap:10px;
}

.input-area input{
flex:1;
padding:15px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:16px;
}

.input-area button{
padding:15px 25px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:16px;
transition:.3s;
}

.input-area button:hover{
background:#1d4ed8;
}

.typing{
display:none;
color:#94a3b8;
margin-bottom:15px;
font-style:italic;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
🤖 AI Agent
</div>

<div class="new-chat" onclick="location.reload()">
➕ New Chat
</div>

<div class="history">

<div class="history-item">
New Conversation
</div>

</div>

</div>

<div class="main">

<div class="header">

AI Agent Studio

</div>

<div id="chatBox" class="chat-box">

<div class="message bot">

👋 Hello! I am your AI Assistant.
How can I help you today?

</div>

<div class="typing" id="typing">

AI is typing...

</div>

</div>

<div class="input-area">

<input
id="message"
type="text"
placeholder="Type your message...">

<button onclick="sendMessage()">

Send

</button>

</div>

</div>
  
<script>

const chatBox = document.getElementById("chatBox");

async function sendMessage(){

    const input = document.getElementById("message");

    const text = input.value.trim();

    if(text=="") return;

    // User Message

    chatBox.innerHTML += `
    <div class="message user">
    ${text}
    </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    input.value="";

    // Typing Animation

    document.getElementById("typing").style.display="block";

    try{

        const response = await fetch("/ask",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                message:text
            })

        });

        const data = await response.json();

        document.getElementById("typing").style.display="none";

        chatBox.innerHTML += `
        <div class="message bot">
        🤖 ${data.reply}
        </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    }

    catch(error){

        document.getElementById("typing").style.display="none";

        chatBox.innerHTML += `
        <div class="message bot">
        ❌ Error connecting to AI server.
        </div>
        `;

    }

}

document.getElementById("message").addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        sendMessage();

    }

});

// Auto Scroll

setInterval(function(){

    chatBox.scrollTop=chatBox.scrollHeight;

},500);

</script>
